version: "3.9"

services:
  companion:
    build: https://github.com/klautimus/hermes-companion-daemon.git#main
    container_name: hermes-companion
    restart: unless-stopped
    ports:
      - "8777:8777"
    environment:
      - HERMES_API_URL=http://host.docker.internal:8642
    volumes:
      - companion-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8777/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  companion-data:
    driver: local
